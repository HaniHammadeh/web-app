name: Build Container

on:
  push:
    branches:
      - main
    paths:
      - "main.py"
      - "Dockerfile"
      - "requirements.txt"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      -
        name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt
      - run: docker build -t hanihammadeh/web-app:${{ github.sha }} .
      - run: docker push hanihammadeh/web-app:${{ github.sha }}
  deploy_on_dev:
    runs-on: self-hosted
    steps:
      - name: check out
        uses: actions/checkout@v4
      - name: Deploy image to dev
        run: |
          kubectl set image deployment/color-app \
            web-app=hanihammadeh/web-app:${{ github.sha}} \
            -n dev

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/color-app \
            -n dev \
            --timeout=120s

      - name: Show deployment
        run: |
          kubectl get pods -n dev
  

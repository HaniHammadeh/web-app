name: Build Container

on:
  push:
  pull_request:
    branches:
      - main
    paths:
      - "main.py"
      - "Dockerfile"
      - "requirements.txt"

jobs:
  scan:
    runs-on:
      - self-hosted

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Scan repository with gitleaks
        run: |
          gitleaks -v detect --config .gitleaks.toml
  semgrep:
    runs-on: self-hosted
    needs: scan

    steps:
      - uses: actions/checkout@v4

      - name: Run Semgrep
        run: |
          semgrep scan --config=p/security-audit
  build:
    runs-on: ubuntu-latest
    needs: [scan, semgrep]

    steps:
      -
        name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Generate short commit
        run: |
          echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - run: pip install -r requirements.txt
      - run: | 
          docker build \
                --build-arg VERSION=${{ github.sha }} \
                --build-arg COMMIT=${{ env.SHORT_SHA }} \
                --build-arg BUILD_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ") \
                -t hanihammadeh/web-app:${{ github.sha }} .

      - run: docker push hanihammadeh/web-app:${{ github.sha }}
  deploy_on_dev:
    needs: build
    runs-on: self-hosted
    steps:
      - name: check out
        uses: actions/checkout@v4
      - name: Deploy image to dev
        run: |
          kubectl set image deployment/color-app \
            web-app=hanihammadeh/web-app:${{ github.sha}} \
            -n dev

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/color-app \
            -n dev \
            --timeout=120s

      - name: Show deployment
        run: |
          kubectl get pods -n dev
  
